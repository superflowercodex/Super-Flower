<!DOCTYPE html>
<html>
<head>
<title>Super Flower Merchandise</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.logo{
width:180px;
max-width:80%;
display:block;
margin:20px auto;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:0;
border:2px solid #d4af37;
border-radius:12px;
overflow:hidden;
background:rgba(212,175,55,0.05);
}

.tile{
display:block;
text-decoration:none;
color:white;
border:1px solid #d4af37;
padding:15px;
transition:0.3s;
}

.tile:hover{
background:rgba(212,175,55,0.15);
}

.tile img{
width:100%;
display:block;
border-radius:8px;
margin-bottom:10px;
}

.tile-title{
font-weight:bold;
line-height:1.4;
}

.store{
display:block;
text-decoration:none;
color:white;
border:2px solid #d4af37;
border-top:none;
padding:18px;
font-weight:bold;
font-size:1.1rem;
background:rgba(212,175,55,0.05);
transition:0.3s;
}

.store:hover{
background:rgba(212,175,55,0.15);
}

.back{
display:inline-block;
margin-top:30px;
color:#d4af37;
text-decoration:none;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

.logo{
width:180px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="Untitled - 09 June 2026 at 12.33.28 (3).png" class="logo" alt="Super Flower">

<div class="grid">

<a class="tile" href="https://ebay.io/m/LQDsXc" target="_blank">
<img src="s-1500(1).webp" alt="SF Tee 001">
<div class="tile-title">
SF Tee 001 | Organic Cotton T-Shirt
</div>
</a>

<a class="tile" href="https://ebay.io/m/ZyPlgw" target="_blank">
<img src="s-l1200(1).jpg" alt="SF Tee 002">
<div class="tile-title">
SF Tee 002 | Organic Cotton T-Shirt
</div>
</a>

<a class="tile" href="https://ebay.io/m/M6Gpfk" target="_blank">
<img src="s-l1200(2).jpg" alt="SF 001 Dad Hat">
<div class="tile-title">
SF 001 Dad Hat
</div>
</a>

<a class="tile" href="https://ebay.io/m/r6b0mo" target="_blank">
<img src="s-l1200(3).jpg" alt="SF 001 Unisex Heavy Zip Hoodie">
<div class="tile-title">
SF 001 Unisex Heavy Zip Hoodie
</div>
</a>

</div>

<a class="store" href="https://ebay.io/m/w8uod1" target="_blank">
VISIT EBAY STORE
</a>

<br>

<a class="back" href="index.html">
← Back to Home
</a>

</div>

</body>
</html>
